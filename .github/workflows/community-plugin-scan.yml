# Community Plugin Security Scan + Auto-Merge
#
# Runs on every PR that adds or modifies files under plugins/**.
# If ALL checks pass and trust score >= 70, the PR is automatically merged.
# PRs that fail any check or score 50-69 are held for human review.
#
# TLP:GREEN
name: Community Plugin Security Scan

on:
  pull_request:
    paths:
      - 'plugins/**'
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Validate plugin manifests and trust scores
  # ────────────────────────────────────────────────────────────────
  validate-plugin:
    name: Validate Plugin
    runs-on: ubuntu-latest
    outputs:
      plugin_dir: ${{ steps.detect.outputs.plugin_dir }}
      trust_score: ${{ steps.trust.outputs.score }}
      plugin_id:   ${{ steps.manifest.outputs.plugin_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed plugin directory
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^plugins/' | head -1)
          DIR=$(echo "$CHANGED" | cut -d/ -f1-2)
          echo "plugin_dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Detected plugin directory: $DIR"

      - name: Validate manifest.json exists
        run: |
          if [ ! -f "${{ steps.detect.outputs.plugin_dir }}/.claude-plugin/manifest.json" ]; then
            echo "ERROR: .claude-plugin/manifest.json is missing"
            exit 1
          fi

      - name: Validate manifest.json schema
        id: manifest
        run: |
          MANIFEST="${{ steps.detect.outputs.plugin_dir }}/.claude-plugin/manifest.json"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('$MANIFEST', 'utf8'));
            const required = ['plugin_id','name','version','description','license','capabilities','permissions','entrypoint','minFrameworkVersion'];
            const missing = required.filter(k => !m[k]);
            if (missing.length) { console.error('Missing fields:', missing.join(', ')); process.exit(1); }
            console.log('plugin_id=' + m.plugin_id);
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'plugin_id=' + m.plugin_id + '\n');
          "

      - name: Validate trust-score.json
        id: trust
        run: |
          SCORE_FILE="${{ steps.detect.outputs.plugin_dir }}/trust-score.json"
          if [ ! -f "$SCORE_FILE" ]; then
            echo "ERROR: trust-score.json is missing"
            exit 1
          fi
          SCORE=$(node -e "const s=JSON.parse(require('fs').readFileSync('$SCORE_FILE','utf8')); console.log(s.overall);")
          echo "Trust score: $SCORE"
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: Enforce minimum trust score (70)
        run: |
          SCORE=${{ steps.trust.outputs.score }}
          if [ "$SCORE" -lt 70 ]; then
            echo "ERROR: Trust score $SCORE is below minimum threshold of 70"
            exit 1
          fi
          echo "Trust score $SCORE meets threshold"

      - name: Validate SBOM present
        run: |
          if [ ! -f "${{ steps.detect.outputs.plugin_dir }}/sbom.json" ]; then
            echo "ERROR: sbom.json is missing"
            exit 1
          fi

      - name: Validate LICENSE exists
        run: |
          if [ ! -f "${{ steps.detect.outputs.plugin_dir }}/LICENSE" ]; then
            echo "ERROR: LICENSE file is missing"
            exit 1
          fi

      - name: Check approved licenses
        run: |
          LICENSE=$(node -e "
            const m = JSON.parse(require('fs').readFileSync('${{ steps.detect.outputs.plugin_dir }}/.claude-plugin/manifest.json', 'utf8'));
            console.log(m.license);
          ")
          APPROVED="MIT Apache-2.0 BSD-2-Clause BSD-3-Clause ISC"
          if ! echo "$APPROVED" | grep -qw "$LICENSE"; then
            echo "ERROR: License '$LICENSE' is not in approved list: $APPROVED"
            exit 1
          fi
          echo "License '$LICENSE' is approved"

      - name: Validate plugin_id matches PR author
        run: |
          PLUGIN_ID="${{ steps.manifest.outputs.plugin_id }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          PREFIX=$(echo "$PLUGIN_ID" | cut -d/ -f1)
          # Allow dcyfr org plugins and plugins where prefix matches author
          if [ "$PREFIX" != "$AUTHOR" ] && [ "$PREFIX" != "dcyfr" ]; then
            echo "WARNING: plugin_id prefix '$PREFIX' does not match PR author '$AUTHOR'"
            echo "This PR will require manual review."
            echo "NEEDS_REVIEW=true" >> "$GITHUB_ENV"
          fi

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Vulnerability scan on SBOM dependencies
  # ────────────────────────────────────────────────────────────────
  vulnerability-scan:
    name: Vulnerability Scan
    needs: validate-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan SBOM for known vulnerabilities
        run: |
          SBOM="${{ needs.validate-plugin.outputs.plugin_dir }}/sbom.json"
          echo "Scanning SBOM: $SBOM"
          # Extract component names and check against known CVE list
          node -e "
            const sbom = JSON.parse(require('fs').readFileSync('$SBOM', 'utf8'));
            const components = sbom.components || [];
            const flagged = [];
            // Check for obviously dangerous package names (placeholder for real scanner)
            const blocklist = ['lodash@4.17.20', 'minimist@<1.2.6', 'node-fetch@<2.6.7'];
            for (const c of components) {
              const ref = (c.name || '') + '@' + (c.version || '');
              if (blocklist.some(b => ref.startsWith(b.split('@')[0]))) {
                console.warn('WARNING: Component may have CVEs:', ref);
                flagged.push(ref);
              }
            }
            console.log('Scanned', components.length, 'components,', flagged.length, 'flagged');
            if (flagged.length > 0) {
              console.error('Flagged components:', flagged.join(', '));
              // Non-fatal: log but don't block auto-merge for warnings
            }
          "

  # ────────────────────────────────────────────────────────────────
  # JOB 3: Auto-merge if all checks pass
  # ────────────────────────────────────────────────────────────────
  auto-merge:
    name: Auto-Merge
    needs: [validate-plugin, vulnerability-scan]
    runs-on: ubuntu-latest
    if: success() && github.event.pull_request.draft == false
    steps:
      - name: Check if needs manual review
        id: review-check
        run: |
          if [ "${{ env.NEEDS_REVIEW }}" = "true" ]; then
            echo "PR requires manual review — skipping auto-merge"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "All checks passed — eligible for auto-merge"
            echo "auto_merge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge PR
        if: steps.review-check.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Merging PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --subject "feat(community): add ${{ needs.validate-plugin.outputs.plugin_id }} [auto-merged]"

      - name: Comment on PR (auto-merged)
        if: steps.review-check.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## ✅ Auto-merged\n\nAll security scans passed and trust score is ${{ needs.validate-plugin.outputs.trust_score }}/100.\n\n> **⚠️ UNAUDITED**: This plugin has passed automated scans but has not been manually reviewed by the DCYFR Security Team."

      - name: Comment on PR (manual review needed)
        if: steps.review-check.outputs.auto_merge == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "## 🔍 Manual Review Required\n\nThis PR cannot be auto-merged because the plugin_id prefix does not match your GitHub handle. A maintainer will review shortly."
